<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Operator</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <meta property="og:title" content="Operator - Tools that solve real problems">
  <meta property="og:description" content="Made by Operator.">
  <meta property="og:image" content="https://madebyoperator.com/operator.png">
  <meta property="og:url" content="https://madebyoperator.com">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Operator - Tools that solve real problems">
  <meta name="twitter:description" content="Made by Operator.">
  <meta name="twitter:image" content="https://madebyoperator.com/operator.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <a href="#" class="logo-mark">
    <img src="/logo.png" alt="Operator">
    <span class="logo-text">Operator</span>
  </a>
  <nav class="header-nav">
    <a href="#projects">Projects</a>
    <span class="search-hint">/ to search</span>
  </nav>
</header>

<section class="hero">
  <div class="hero-face-wrap">
    <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" alt="Operator" class="hero-logo">
  </div>
  <h1 id="hero-title">Tools that solve <em>real problems</em>, made by Operator.</h1>
  <div class="hero-cta">
    <a href="#projects">Browse Projects</a>
  </div>
</section>

<section class="projects" id="projects">
  <div class="section-header">
    <h2>Projects</h2>
    <div class="section-line"></div>
  </div>

  <div class="project-grid" id="project-grid">
    <!-- Projects injected by main.ts -->
  </div>
</section>

<div class="command-palette" id="command-palette">
  <div class="cp-container">
    <div class="cp-input-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" class="cp-input" id="cp-input" placeholder="Search projects or tech..." autocomplete="off">
    </div>
    <div class="cp-results" id="cp-results"></div>
  </div>
</div>

<script type="application/ld+json" id="ld-json"></script>


<footer>
  <p class="footer-text">Operator</p>
</footer>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
